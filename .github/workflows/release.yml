name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (aarch64)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Sign app (ad-hoc)
        run: codesign --force --deep --sign - src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app

      - name: Create DMG
        run: |
          DMG_OUT="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Ladebert-macOS.dmg"
          rm -f "$DMG_OUT"
          hdiutil create -volname "Ladebert" \
            -srcfolder "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app" \
            -ov -format UDZO "$DMG_OUT"

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Ladebert-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp for Windows
        run: |
          curl -L -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe

      - name: Download ffmpeg for Windows
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg-tmp
          Copy-Item "ffmpeg-tmp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
        shell: pwsh

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
