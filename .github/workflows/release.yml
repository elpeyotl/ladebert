name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Download macOS binaries
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          chmod +x src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          cp src-tauri/binaries/yt-dlp-aarch64-apple-darwin src-tauri/binaries/yt-dlp-x86_64-apple-darwin
          curl -L -o src-tauri/binaries/ffmpeg-aarch64-apple-darwin https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          # evermeet provides a zip, extract it
          cd src-tauri/binaries
          if file ffmpeg-aarch64-apple-darwin | grep -q "Zip"; then
            mv ffmpeg-aarch64-apple-darwin ffmpeg.zip
            unzip -o ffmpeg.zip
            mv ffmpeg ffmpeg-aarch64-apple-darwin
            rm -f ffmpeg.zip
          fi
          chmod +x ffmpeg-aarch64-apple-darwin
          cp ffmpeg-aarch64-apple-darwin ffmpeg-x86_64-apple-darwin

      - name: Import Apple certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build Tauri (aarch64, signed, no notarization)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app"
          ZIP=$(mktemp /tmp/ladebert-notarize.XXXXXX.zip)
          ditto -c -k --keepParent "$APP" "$ZIP"

          # Submit (retry upload up to 5 times)
          for i in 1 2 3 4 5; do
            echo "Upload attempt $i..."
            OUTPUT=$(xcrun notarytool submit "$ZIP" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1) && break
            echo "Upload failed, retrying in $((i * 30))s..."
            sleep $((i * 30))
          done

          SUBMISSION_ID=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          # Wait for result separately (more resilient)
          xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --timeout 30m

          # Check result
          xcrun notarytool info "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

          # Staple the notarization ticket
          xcrun stapler staple "$APP"
          echo "Notarization complete!"

      - name: Create DMG
        run: |
          DMG_OUT="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Ladebert-macOS.dmg"
          rm -f "$DMG_OUT"
          hdiutil create -volname "Ladebert" \
            -srcfolder "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app" \
            -ov -format UDZO "$DMG_OUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Ladebert-macOS.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries
        shell: bash

      - name: Download yt-dlp for Windows
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"
        shell: pwsh

      - name: Download ffmpeg for Windows
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          7z x ffmpeg.zip -offmpeg-tmp
          Copy-Item "ffmpeg-tmp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
        shell: pwsh

      - name: Build Tauri (Windows, signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        run: |
          MAC_SIG=$(cat artifacts/macos-artifacts/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app.tar.gz.sig)
          # Find the NSIS .sig file
          WIN_SIG_FILE=$(find artifacts/windows-artifacts -name "*.nsis.zip.sig" | head -1)
          WIN_SIG=$(cat "$WIN_SIG_FILE")

          cat > latest.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_SIG",
                "url": "https://github.com/elpeyotl/ladebert/releases/download/${GITHUB_REF_NAME}/Ladebert.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$MAC_SIG",
                "url": "https://github.com/elpeyotl/ladebert/releases/download/${GITHUB_REF_NAME}/Ladebert.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/elpeyotl/ladebert/releases/download/${GITHUB_REF_NAME}/Ladebert_${{ steps.version.outputs.version }}_x64-setup.nsis.zip"
              }
            }
          }
          EOF

      - name: Find release files
        id: files
        run: |
          echo "nsis_zip=$(find artifacts/windows-artifacts -name '*.nsis.zip' ! -name '*.sig' | head -1)" >> "$GITHUB_OUTPUT"
          echo "nsis_exe=$(find artifacts/windows-artifacts -name '*.exe' | head -1)" >> "$GITHUB_OUTPUT"
          echo "msi=$(find artifacts/windows-artifacts -name '*.msi' ! -name '*.zip*' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-artifacts/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Ladebert-macOS.dmg
            artifacts/macos-artifacts/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Ladebert.app.tar.gz
            ${{ steps.files.outputs.nsis_exe }}
            ${{ steps.files.outputs.nsis_zip }}
            ${{ steps.files.outputs.msi }}
            latest.json
