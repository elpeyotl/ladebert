  <line x1="86" y1="346" x2="94" y2="346" stroke="#888" stroke-width="1.5"/>
  <circle cx="282" cy="346" r="7" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <line x1="278" y1="346" x2="286" y2="346" stroke="#888" stroke-width="1.5"/>

  <!-- 9 colored buttons - 3x3 grid (right side) -->
  <!-- Row 1 -->
  <circle cx="358" cy="150" r="20" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="358" cy="150" r="16" fill="#2d2017"/>
  <circle cx="408" cy="150" r="20" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <circle cx="458" cy="150" r="20" fill="#1e88e5" stroke="#1565c0" stroke-width="1"/>

  <!-- Row 2 -->
  <circle cx="358" cy="210" r="20" fill="#43a047" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="408" cy="210" r="20" fill="#fdd835" stroke="#f9a825" stroke-width="1"/>
  <circle cx="458" cy="210" r="20" fill="#00bcd4" stroke="#00838f" stroke-width="1"/>

  <!-- Row 3 -->
  <circle cx="358" cy="270" r="20" fill="#81d4fa" stroke="#4fc3f7" stroke-width="1"/>
  <circle cx="408" cy="270" r="20" fill="#ff7043" stroke="#e64a19" stroke-width="1"/>
  <circle cx="458" cy="270" r="20" fill="#2e7d32" stroke="#1b5e20" stroke-width="1"/>

