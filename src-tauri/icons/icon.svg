    <circle cx="72" cy="250" r="4"/><circle cx="92" cy="250" r="4"/><circle cx="112" cy="250" r="4"/><circle cx="132" cy="250" r="4"/><circle cx="152" cy="250" r="4"/><circle cx="172" cy="250" r="4"/><circle cx="192" cy="250" r="4"/><circle cx="212" cy="250" r="4"/><circle cx="232" cy="250" r="4"/><circle cx="252" cy="250" r="4"/><circle cx="272" cy="250" r="4"/><circle cx="292" cy="250" r="4"/>
    <circle cx="76" cy="270" r="4"/><circle cx="96" cy="270" r="4"/><circle cx="116" cy="270" r="4"/><circle cx="136" cy="270" r="4"/><circle cx="156" cy="270" r="4"/><circle cx="176" cy="270" r="4"/><circle cx="196" cy="270" r="4"/><circle cx="216" cy="270" r="4"/><circle cx="236" cy="270" r="4"/><circle cx="256" cy="270" r="4"/><circle cx="276" cy="270" r="4"/><circle cx="296" cy="270" r="4"/>
    <circle cx="86" cy="290" r="4"/><circle cx="106" cy="290" r="4"/><circle cx="126" cy="290" r="4"/><circle cx="146" cy="290" r="4"/><circle cx="166" cy="290" r="4"/><circle cx="186" cy="290" r="4"/><circle cx="206" cy="290" r="4"/><circle cx="226" cy="290" r="4"/><circle cx="246" cy="290" r="4"/><circle cx="266" cy="290" r="4"/><circle cx="286" cy="290" r="4"/>
    <circle cx="96" cy="310" r="4"/><circle cx="116" cy="310" r="4"/><circle cx="136" cy="310" r="4"/><circle cx="156" cy="310" r="4"/><circle cx="176" cy="310" r="4"/><circle cx="196" cy="310" r="4"/><circle cx="216" cy="310" r="4"/><circle cx="236" cy="310" r="4"/><circle cx="256" cy="310" r="4"/><circle cx="276" cy="310" r="4"/>
    <circle cx="106" cy="330" r="4"/><circle cx="126" cy="330" r="4"/><circle cx="146" cy="330" r="4"/><circle cx="166" cy="330" r="4"/><circle cx="186" cy="330" r="4"/><circle cx="206" cy="330" r="4"/><circle cx="226" cy="330" r="4"/><circle cx="246" cy="330" r="4"/><circle cx="266" cy="330" r="4"/>
  </g>

  <!-- Corner screws on speaker -->
