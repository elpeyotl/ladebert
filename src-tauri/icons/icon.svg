  <line x1="86" y1="154" x2="94" y2="154" stroke="#888" stroke-width="1.5"/>
  <circle cx="282" cy="154" r="7" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <line x1="278" y1="154" x2="286" y2="154" stroke="#888" stroke-width="1.5"/>
