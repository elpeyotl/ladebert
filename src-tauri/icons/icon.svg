<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#c4935a"/>

  <!-- Wooden frame border -->
  <rect x="8" y="8" width="496" height="496" rx="76" fill="none" stroke="#a87842" stroke-width="6"/>

  <!-- Inner panel (cream/birch color) -->
  <rect x="32" y="50" width="448" height="420" rx="20" fill="#f5edd4"/>
  <rect x="32" y="50" width="448" height="420" rx="20" stroke="#e0d5b8" stroke-width="2"/>

  <!-- Handle -->
  <path d="M160 50 Q160 10 200 10 L312 10 Q352 10 352 50" fill="none" stroke="#c4935a" stroke-width="24" stroke-linecap="round"/>
  <path d="M160 50 Q160 14 200 14 L312 14 Q352 14 352 50" fill="none" stroke="#a87842" stroke-width="18" stroke-linecap="round"/>

  <!-- Volume knob (top right) -->
  <circle cx="420" cy="50" r="18" fill="#888"/>
  <circle cx="420" cy="50" r="16" fill="#777"/>
  <rect x="411" y="50" width="18" height="2" rx="1" fill="#aaa" transform="rotate(-45 420 50)"/>
  <circle cx="420" cy="50" r="14" fill="#777" stroke="#999" stroke-width="1"/>
  <!-- Knurled texture lines -->
  <circle cx="420" cy="50" r="17" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="420" y1="35" x2="420" y2="42" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>

