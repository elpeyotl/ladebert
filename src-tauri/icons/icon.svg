    <!-- Generate dot grid for speaker -->
    <circle cx="106" cy="170" r="4"/><circle cx="126" cy="170" r="4"/><circle cx="146" cy="170" r="4"/><circle cx="166" cy="170" r="4"/><circle cx="186" cy="170" r="4"/><circle cx="206" cy="170" r="4"/><circle cx="226" cy="170" r="4"/><circle cx="246" cy="170" r="4"/><circle cx="266" cy="170" r="4"/>
    <circle cx="96" cy="190" r="4"/><circle cx="116" cy="190" r="4"/><circle cx="136" cy="190" r="4"/><circle cx="156" cy="190" r="4"/><circle cx="176" cy="190" r="4"/><circle cx="196" cy="190" r="4"/><circle cx="216" cy="190" r="4"/><circle cx="236" cy="190" r="4"/><circle cx="256" cy="190" r="4"/><circle cx="276" cy="190" r="4"/>
    <circle cx="86" cy="210" r="4"/><circle cx="106" cy="210" r="4"/><circle cx="126" cy="210" r="4"/><circle cx="146" cy="210" r="4"/><circle cx="166" cy="210" r="4"/><circle cx="186" cy="210" r="4"/><circle cx="206" cy="210" r="4"/><circle cx="226" cy="210" r="4"/><circle cx="246" cy="210" r="4"/><circle cx="266" cy="210" r="4"/><circle cx="286" cy="210" r="4"/>
